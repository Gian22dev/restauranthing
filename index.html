<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login">

    <div class="login__card">

      <!-- IZQUIERDA -->
      <section class="login__info">

        <span class="login__chinese">登录</span>

        <h1 class="login__title">
          Control total de tu restaurante,
          en un solo lugar.
        </h1>

        <p class="login__text">
          Accede rápidamente para gestionar mesas, pedidos
          y caja sin fricción.
        </p>

        <!-- FORM -->
        <form class="form">

          <div class="form__group">
            <input type="text" placeholder="Usuario">
          </div>

          <div class="form__group">
            <input type="password" placeholder="Contraseña">
          </div>

          <label class="form__checkbox">
            <input type="checkbox">
            Recordar sesión
          </label>

          <button type="submit" class="btn-primary">
            Entrar
          </button>

        </form>

      </section>

      <!-- DERECHA -->
      <section class="login__visual">

        <img src="./chopsuey.png" alt="Ilustración ramen" class="login__image">

        <img src="./TRlogo.png" alt="Techos Rojos" class="login__logo">

      </section>

    </div>

  </main>
</body>
</html>
