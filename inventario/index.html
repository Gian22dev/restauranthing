<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inventario</title>
  <link rel="stylesheet" href="./style.css">
  <script src="script.js" defer></script>
</head>
<body>

<!-- Logo SAKURA -->


<!-- Kanjis decorativos -->
<span class="kanji-decorative" style="
  position: fixed;
  top: 2rem;
  left: 2rem;
  font-size: 8rem;
  line-height: 1;
  display: block;
  color: hsla(10, 80%, 55%, 0.08);
  font-weight: 700;
  user-select: none;
  z-index: 0;
">紅</span>

<span class="kanji-decorative" style="
  position: fixed;
  bottom: 3rem;
  right: 3rem;
  font-size: 6rem;
  line-height: 1;
  display: block;
  color: hsla(10, 80%, 55%, 0.08);
  font-weight: 700;
  user-select: none;
  z-index: 0;
">屋</span>

<!-- Imagen decorativa rotando -->
<img src="../src/chopsuey.png" alt="" class="decor-rotate" style="user-select: none;">

<div class="layout">
<aside class="sidebar">

  <div class="brand">
    <div class="logo">麺</div>
    <div>
      <h3>SAKURA</h3>
      <span>Mesero</span>
    </div>
  </div>

  <nav>
    <a href="../mesas/pedidos/mesas.pedidos.html">Mesas</a>
      <a href="../NewRapido/index.html">Rapido</a>
      <a href="../domicilios/domicilios.html">Domicilios</a>
      <a href="../caja.html">Caja</a>
      <a class="active">Inventario</a>
      <a href="../historial.html">Usuarios</a>
  </nav>

  <button class="logout">Cerrar sesión</button>

</aside>

<main class="content">
  <div class="container">

    <div class="card">

      <!-- HEADER -->
      <div class="header">
        <div class="header-left">
          <span class="breadcrumb" id="breadcrumb">庫存 · INVENTORY</span>
          <h1 id="pageTitle">Inventario</h1>
          <p id="pageSubtitle">Gestiona el inventario del restaurante</p>
        </div>
        <button class="btn-primary" id="newBtn" onclick="cambiarSeccion('crear', document.querySelectorAll('.tabs button')[1])">+ Nuevo producto</button>
      </div>

      <div class="filters">
        <input type="text" id="search" placeholder="Buscar producto..." onkeyup="filtrar()">
        <button id="langToggle" class="lang-btn" onclick="cambiarIdioma()">中文</button>

        <div class="tabs">
          <button onclick="cambiarSeccion('stock', this)" class="active" id="tabStock">Stock</button>
        <button onclick="cambiarSeccion('crear', this)" id="tabCrear">Agregar</button>
        <button onclick="cambiarSeccion('mov', this)" id="tabMov">Movimiento</button>
        </div>
      </div>

      <!-- STOCK -->
      <div id="stock" class="seccion active">
        <table>
          <thead>
            <tr>
              <th id="thNombre">Nombre</th>
              <th id="thTipo">Tipo</th>
              <th id="thStock">Stock</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
      </div>

      <!-- CREAR -->
      <div id="crear" class="seccion">
        <input type="text" id="nombre" placeholder="Nombre">
        <select id="tipo">
          <option value="gramos" id="optGramos">Gramos</option>
          <option value="unidad" id="optUnidad">Unidad</option>
        </select>
        <input type="number" id="stockInput" placeholder="Stock">
        <button class="btn-main" id="btnCrear" onclick="crearInsumo()">Crear</button>
      </div>

      <!-- MOVIMIENTO -->
      <div id="mov" class="seccion">
        <select id="insumoSelect"></select>
        <input type="number" id="cantidadMov" placeholder="Cantidad">
        <select id="tipoMov">
          <option value="entrada" id="optEntrada">Entrada</option>
          <option value="salida" id="optSalida">Salida</option>
          <option value="ajuste" id="optAjuste">Ajuste</option>
        </select>
        <button class="btn-main" id="btnAplicar" onclick="registrarMovimiento()">Aplicar</button>
      </div>

    </div>

  </div>
</main>

<div id="toast" class="toast"></div>
</body>
</html>
