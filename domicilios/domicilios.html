<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura POS - Domicilios</title>
    <link rel="stylesheet" href="domicilios.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">紅</div>
                <div class="brand-info">
                    <h3>SAKURA</h3>
                    <span class="mesero-label">MESERO</span>
                </div>
            </div>
            <nav>
                <a href="../mesas/mesas_pedidos.html"><i class='bx bx-dish'></i> <span>Mesas</span></a>
                <a href="../NewRapido/index.html"><i class='bx bx-bolt-circle'></i> <span>Rápido</span></a>
                <a href="#" class="active"><i class='bx bx-cycling'></i> <span>Domicilios</span></a>
                <a href="../inventario/index.html"><i class='bx bx-package'></i> <span>Inventario</span></a>
                <a href="../historial/historial.html"><i class='bx bx-history'></i> <span>Historial</span></a>
            </nav>
            <button class="logout" onclick="location.href='../login/index.html'"><i class='bx bx-log-out'></i> Salir</button>
        </aside>

        <main class="content">
            <header class="header">
                <div>
                    <span class="breadcrumb">Administración</span>
                    <h1>Domicilios</h1>
                </div>
                <button class="btn-primary" id="btnNuevo"><i class='bx bx-plus'></i> Nuevo Pedido</button>
            </header>

            <section class="stats">
                <div class="stat"><span>Pendientes</span><h2 id="countPendientes">0</h2></div>
                <div class="stat"><span>En Ruta</span><h2 id="countRuta">0</h2></div>
                <div class="stat"><span>Entregados</span><h2 id="countEntregados">0</h2></div>
            </section>

            <section class="filter-bar">
                <div class="search-container">
                    <i class='bx bx-search'></i>
                    <input type="text" id="searchInput" placeholder="Buscar cliente o dirección...">
                </div>
                <div class="tabs">
                    <button class="tab-btn active" data-filter="todos">Todos</button>
                    <button class="tab-btn" data-filter="pendiente">Pendientes</button>
                    <button class="tab-btn" data-filter="ruta">En Ruta</button>
                    <button class="tab-btn" data-filter="entregado">Entregados</button>
                </div>
            </section>

            <section class="cards-grid" id="cardsContainer"></section>
        </main>
    </div>
    <script src="domicilios.js"></script>
</body>
</html>
